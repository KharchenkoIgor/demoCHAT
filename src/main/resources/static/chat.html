<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:,">
  <title>DemoCHAT - Lounge</title>
  <link rel="stylesheet" href="/css/chat.css">
</head>
<body>

<!-- 1. Боковая панель серверов -->
<div class="sidebar-servers" id="server-list">
  <div id="home-button" class="server-icon" title="Home" onclick="goToHome()">🏠</div>
  <div id="add-server-button" class="server-icon add-server-btn">+</div>
</div>

<!-- 2. Боковая панель каналов -->
<div class="sidebar-channels">
  <div id="server-header-container" class="server-header-area">
    <span>サーバーを選択</span>
  </div>
  <div class="channel-list" id="channel-list"></div>
</div>

<!-- 3. Боковая панель участников -->
<div class="sidebar-members">
  <div class="members-header">参加者</div>
  <div id="member-list"></div>
</div>

<!-- 4. Основная зона чата -->
<div class="main-chat">
  <div class="top-bar">
    <span id="chat-channel-name"># チャンネルを選択してください</span>
    <button onclick="logout()" class="btn-logout">Logout</button>
  </div>

  <div id="chat" class="chat-messages">
    チャットへようこそ
  </div>

  <div class="chat-input-area">
    <input type="text" id="message-input" class="chat-input" placeholder="メッセージを送信...">
    <button id="send-button" class="btn-send">送信</button>
  </div>
</div>

<!-- Модальное окно -->
<div id="universal-modal" class="modal-overlay" style="display: none;">
  <div class="modal-content">
    <h3 id="modal-title">名称</h3>
    <p id="modal-description" class="modal-desc">入力欄</p>
    <input type="text" id="modal-input" placeholder="名称を入力して下さい">
    <div class="modal-buttons">
      <button class="btn-cancel">キャンセル</button>
      <button class="btn-create" id="modal-submit-button">作成</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
  lucide.createIcons();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script type="module" src="/js/app.js"></script>
<script src="/js/authenticator/logout.js"></script>

</body>
</html>
